name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'CrudGenerator/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - 'CrudGenerator/**'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4 # Action to check out your repository code
      with:
        submodules: 'recursive'
        fetch-depth: 0 # Fetch all history
        token: ${{ secrets.BUILD }}
     
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1
      
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Build CrudGenerator.App.Wpf net462/WixInstaller.net462
      run: |
        msbuild /t:restore app/CrudGenerator.App.Wpf/CrudGenerator.App.Wpf.csproj
        msbuild app/CrudGenerator.App.Wpf/CrudGenerator.App.Wpf.csproj /p:Platform=AnyCPU /p:TargetFramework=net462
        msbuild /t:restore app/CrudGenerator.App.Wpf.WixInstaller.net462/CrudGenerator.App.Wpf.WixInstaller.net462.wixproj
        msbuild app/CrudGenerator.App.Wpf.WixInstaller.net462/CrudGenerator.App.Wpf.WixInstaller.net462.wixproj /p:Platform=x86
      env:
        Configuration: Release
        SolutionDir: ${{ github.workspace }}\
        ProjectDir: ${{ github.workspace }}\app\CrudGenerator.App.Wpf.WixInstaller.net462\

    - name: Build CrudGenerator.App.Wpf net8.0/WixInstaller.net8.0
      run: |
        msbuild /t:restore app/CrudGenerator.App.Wpf/CrudGenerator.App.Wpf.csproj
        msbuild app/CrudGenerator.App.Wpf/CrudGenerator.App.Wpf.csproj /p:Platform=AnyCPU /p:TargetFramework=net8.0
        msbuild /t:restore app/CrudGenerator.App.Wpf.WixInstaller.net8.0/CrudGenerator.App.Wpf.WixInstaller.net8.0.wixproj
        msbuild app/CrudGenerator.App.Wpf.WixInstaller.net8.0/CrudGenerator.App.Wpf.WixInstaller.net8.0.wixproj /p:Platform=x64
      env:
        Configuration: Release
        SolutionDir: ${{ github.workspace }}\
        ProjectDir: ${{ github.workspace }}\app\CrudGenerator.App.Wpf.WixInstaller.net8.0\

    - name: Build CrudGenerator.App.Wpf net9.0/WixInstaller.net9.0
      run: |
        msbuild /t:restore app/CrudGenerator.App.Wpf/CrudGenerator.App.Wpf.csproj
        msbuild app/CrudGenerator.App.Wpf/CrudGenerator.App.Wpf.csproj /p:Platform=AnyCPU /p:TargetFramework=net9.0
        msbuild /t:restore app/CrudGenerator.App.Wpf.WixInstaller.net9.0/CrudGenerator.App.Wpf.WixInstaller.net9.0.wixproj
        msbuild app/CrudGenerator.App.Wpf.WixInstaller.net9.0/CrudGenerator.App.Wpf.WixInstaller.net9.0.wixproj /p:Platform=x64
      env:
        Configuration: Release
        SolutionDir: ${{ github.workspace }}\
        ProjectDir: ${{ github.workspace }}\app\CrudGenerator.App.Wpf.WixInstaller.net9.0\